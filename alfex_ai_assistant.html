<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alfex AI Assistant</title>

  <!-- n8n Chat Widget Styles -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f6f9;
    }

    /* The chat container must have explicit dimensions for fullscreen mode */
    #n8n-chat {
      width: 100%;
      height: 100vh;
      min-height: 600px;
      display: block;
      position: relative;
    }

    /* Salesforce Lightning colour overrides */
    :root {
      --chat--color--primary: #0070d2;
      --chat--color--primary-shade-50: #005fb2;
      --chat--color--primary--shade-100: #004e92;
      --chat--color--secondary: #0070d2;
      --chat--color-secondary-shade-50: #005fb2;
      --chat--color-dark: #16325c;
      --chat--color-light: #f4f6f9;
      --chat--header--background: #16325c;
      --chat--header--color: #ffffff;
      --chat--message--bot--background: #ffffff;
      --chat--message--user--background: #0070d2;
      --chat--message--user--color: #ffffff;
    }

    /* Force the chat to fill the container */
    .n8n-chat,
    .chat-wrapper,
    .chat-layout {
      width: 100% !important;
      height: 100vh !important;
      max-width: 100% !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
      position: relative !important;
    }
  </style>
</head>
<body>

  <!-- Target container for the chat widget -->
  <div id="n8n-chat"></div>

  <!-- Load the n8n chat widget using a regular script tag (avoids iframe module restrictions) -->
  <script>
    // Dynamically load the ES module after DOM is ready
    window.addEventListener('DOMContentLoaded', function () {

      // Create a module script element
      var script = document.createElement('script');
      script.type = 'module';
      script.textContent = `
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
          webhookUrl: 'https://alfex.app.n8n.cloud/webhook/10dbcd0c-36bc-4bd4-9bc9-bb594aa6b026',
          target: '#n8n-chat',
          mode: 'fullscreen',
          showWelcomeScreen: false,
          loadPreviousSession: false,
          initialMessages: [
            "Hi! I'm your Alfex AI Assistant.",
            "I can help you find accounts, contacts, and plan the best route to visit your customers. How can I help you today?"
          ],
          i18n: {
            en: {
              title: 'Alfex AI Assistant',
              subtitle: 'Ask me about your Salesforce accounts, contacts, or plan a visit route.',
              footer: '',
              getStarted: 'New Conversation',
              inputPlaceholder: 'Ask me anything about your Salesforce data...',
            },
          },
        });
      `;
      document.body.appendChild(script);
    });
  </script>

</body>
</html>
