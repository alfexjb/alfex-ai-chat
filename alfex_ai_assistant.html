<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alfex AI Assistant</title>

  <!-- n8n Chat Widget Styles -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background-color: #e8edf3;
    }

    /* Outer wrapper — adds the left/right padding and centres the chat */
    #chat-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 24px 10%;   /* 24px top/bottom, 10% left/right — adjust % to taste */
    }

    /* Inner container that the chat widget fills */
    #n8n-chat {
      flex: 1;
      max-width: 900px;    /* cap the maximum width */
      min-width: 320px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
    }

    /* Salesforce Lightning colour overrides */
    :root {
      --chat--color--primary: #0070d2;
      --chat--color--primary-shade-50: #005fb2;
      --chat--color--primary--shade-100: #004e92;
      --chat--color--secondary: #0070d2;
      --chat--color-secondary-shade-50: #005fb2;
      --chat--color-dark: #16325c;
      --chat--color-light: #f4f6f9;
      --chat--header--background: #16325c;
      --chat--header--color: #ffffff;
      --chat--message--bot--background: #ffffff;
      --chat--message--user--background: #0070d2;
      --chat--message--user--color: #ffffff;
    }

    /* Force the chat widget to fill its container */
    .n8n-chat,
    .chat-wrapper,
    .chat-layout {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>

  <div id="chat-wrapper">
    <div id="n8n-chat"></div>
  </div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://alfex.app.n8n.cloud/webhook/10dbcd0c-36bc-4bd4-9bc9-bb594aa6b026/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      showWelcomeScreen: false,
      loadPreviousSession: false,
      initialMessages: [
        "Hi! I'm your Alfex AI Assistant.",
        "I can help you find accounts, contacts, and plan the best route to visit your customers.",
        "Here are some examples of what you can ask me:",
        "\u2022 Show me all accounts in Richmond VIC that are interested in Haas",
        "\u2022 Show me all accounts in Brisbane QLD interested in Epilog and give me the best route to visit them",
        "\u2022 Find all accounts in Sydney NSW interested in Lotus",
        "\u2022 Find all accounts in Melbourne that are interested in Haas and plan the best driving route",
        "How can I help you today?"
      ],
      i18n: {
        en: {
          title: 'Alfex AI Assistant',
          subtitle: 'Ask me about your Salesforce accounts, contacts, or plan a visit route.',
          footer: '',
          getStarted: 'New Conversation',
          inputPlaceholder: 'Ask me anything about your Salesforce data...',
        },
      },
    });
  </script>

</body>
</html>
