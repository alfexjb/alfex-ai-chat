<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alfex AI Assistant</title>

  <!-- n8n Chat Widget Styles -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background-color: #e8edf3;
    }

    #chat-wrapper {
      display: flex;
      align-items: stretch;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 12px 10%;
    }

    #n8n-chat {
      flex: 1;
      max-width: 900px;
      min-width: 320px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
    }

    /* Login overlay — sits OUTSIDE #n8n-chat using position:fixed so the widget can't remove it */
    #login-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(22, 50, 92, 0.97);
      z-index: 99999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    #login-overlay.visible {
      display: flex;
    }

    #login-overlay h2 {
      color: #ffffff;
      font-family: sans-serif;
      font-size: 1.4rem;
      margin-bottom: 12px;
    }

    #login-overlay p {
      color: #c8d8f0;
      font-family: sans-serif;
      font-size: 0.95rem;
      margin-bottom: 28px;
      max-width: 400px;
      line-height: 1.5;
    }

    #login-btn {
      background: #0070d2;
      color: #ffffff;
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-family: sans-serif;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    #login-btn:hover {
      background: #005fb2;
    }

    /* Salesforce Lightning colour overrides */
    :root {
      --chat--color--primary: #0070d2;
      --chat--color--primary-shade-50: #005fb2;
      --chat--color--primary--shade-100: #004e92;
      --chat--color--secondary: #0070d2;
      --chat--color-secondary-shade-50: #005fb2;
      --chat--color-dark: #16325c;
      --chat--color-light: #f4f6f9;
      --chat--header--background: #16325c;
      --chat--header--color: #ffffff;
      --chat--message--bot--background: #ffffff;
      --chat--message--user--background: #0070d2;
      --chat--message--user--color: #ffffff;
      --chat--message--margin-bottom: 0.35rem;
      --chat--spacing: 0.75rem;
    }

    .n8n-chat,
    .chat-wrapper,
    .chat-layout {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>

  <!-- Login overlay lives at body level so the n8n widget cannot remove it -->
  <div id="login-overlay">
    <h2>Connect Your Salesforce Account</h2>
    <p>To use the Alfex AI Assistant, you need to log in with your Salesforce account. This only needs to be done once.</p>
    <button id="login-btn" onclick="openLogin()">Log in to Salesforce</button>
  </div>

  <div id="chat-wrapper">
    <div id="n8n-chat"></div>
  </div>

  <!-- Load the n8n chat widget as a regular script (UMD build) -->
  <script src="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.umd.js"></script>

  <script>
    // Get the Salesforce User ID — try multiple methods
    var userId = 'unknown_user';

    // Method 1: Salesforce session API (works inside Lightning iframe)
    try {
      if (typeof sforce !== 'undefined' && sforce.one && sforce.one.getUserId) {
        var sfId = sforce.one.getUserId();
        if (sfId && sfId.length > 0) userId = sfId;
      }
    } catch(e) {}

    // Method 2: URL parameter (skip if it's the literal unresolved merge field)
    if (userId === 'unknown_user') {
      try {
        var urlParams = new URLSearchParams(window.location.search);
        var paramUserId = urlParams.get('userId');
        if (paramUserId && paramUserId.length > 0 && paramUserId !== '{!User.Id}') {
          userId = paramUserId;
        }
      } catch(e) {}
    }

    // Method 3: Try reading from parent frame URL
    if (userId === 'unknown_user') {
      try {
        var parentUrl = window.parent.location.href;
        var match = parentUrl.match(/userId=([^&]+)/);
        if (match && match[1] && match[1] !== '%7B!User.Id%7D') userId = match[1];
      } catch(e) {}
    }

    // Clear any cached n8n chat session so the widget always starts fresh
    // (prevents the login-required message from replaying after OAuth redirect)
    try {
      Object.keys(localStorage).forEach(function(key) {
        if (key.indexOf('n8n') !== -1 || key.indexOf('chat') !== -1) {
          localStorage.removeItem(key);
        }
      });
    } catch(e) {}

    // Initialise the chat widget using the global N8nChat object (UMD build)
    window.N8nChat.createChat({
      webhookUrl: 'https://alfex.app.n8n.cloud/webhook/10dbcd0c-36bc-4bd4-9bc9-bb594aa6b026/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      showWelcomeScreen: false,
      loadPreviousSession: false,
      metadata: {
        userId: userId
      },
      initialMessages: [
        "Hi! I'm your Alfex AI Assistant.\nI can help you find accounts, contacts, assets, and plan the best route to visit your customers.\n\nHere are some examples of what you can ask me:\n- Show me all accounts in Richmond VIC that are interested in Haas\n- Give me all accounts in Brisbane QLD that have an Epilog and give me the best route to visit them\n- Find all accounts in Sydney NSW interested in Lotus\n- Show me all accounts in Melbourne that are interested in Haas and plan the best driving route\n\nHow can I help you today?"
      ],
      i18n: {
        en: {
          title: 'Alfex AI Assistant',
          subtitle: 'Ask me about your Salesforce accounts, contacts, or plan a visit route.',
          footer: '',
          getStarted: 'New Conversation',
          inputPlaceholder: 'Ask me anything about your Salesforce data...',
        },
      },
    });

    // Poll every 300ms using TreeWalker to detect the login token in any text node
    var loginDetected = false;

    function checkForLoginToken() {
      if (loginDetected) return;

      var chatContainer = document.getElementById('n8n-chat');
      if (!chatContainer) return;

      var walker = document.createTreeWalker(
        chatContainer,
        NodeFilter.SHOW_TEXT,
        null,
        false
      );

      var node;
      while ((node = walker.nextNode())) {
        var text = node.nodeValue || '';
        if (text.indexOf('SALESFORCE_LOGIN_REQUIRED::') !== -1) {
          loginDetected = true;
          // Extract the URL and decode HTML entities (e.g. &amp; -> &)
          var rawUrl = text.split('SALESFORCE_LOGIN_REQUIRED::')[1].trim();
          var tmp = document.createElement('textarea');
          tmp.innerHTML = rawUrl;
          var loginUrl = tmp.value;
          if (loginUrl) {
            var overlay = document.getElementById('login-overlay');
            pendingLoginUrl = loginUrl;
            overlay.classList.add('visible');
          }
          break;
        }
      }
    }

    setInterval(checkForLoginToken, 300);

    // Store login URL globally so the button can open it via window.open()
    var pendingLoginUrl = null;

    function openLogin() {
      if (pendingLoginUrl) {
        window.open(pendingLoginUrl, '_blank', 'noopener=no');
      }
    }
  </script>

</body>
</html>
